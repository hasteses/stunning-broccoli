version: '3.9'

services:
  app:
    build: .
    expose:
      - '8080'
    volumes:
      - storage:/app/storage
    networks:
      - app_net
    restart: unless-stopped

  nginx:
    image: nginx:1.29
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app_net
    restart: unless-stopped

volumes:
  storage:

networks:
  app_net:
    driver: bridge